name: RSS to Feishu Bot

on:
  schedule:
    # 每天执行两次 (分别对应北京时间上午 8 点和晚上 8 点)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 支持手动触发测试

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run RSS Bot
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          BITABLE_APP_TOKEN: ${{ secrets.BITABLE_APP_TOKEN }}
          BITABLE_TABLE_ID: ${{ secrets.BITABLE_TABLE_ID }}
        run: python main.py

      - name: Commit and Push if updated
        run: |
          git config --local user.email "github-actions[bot]@github.com"
          git config --local user.name "github-actions[bot]"
          git add sent_articles.json
          git commit -m "chore: update sent articles cache" || echo "No changes to commit"
          git push
