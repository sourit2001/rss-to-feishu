name: RSS to Feishu Bot

on:
  schedule:
    # 每 2 小时运行一次 (UTC 时间)
    - cron: '0 */2 * * *'
  workflow_dispatch: # 支持手动触发测试

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run RSS Bot
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python main.py

      - name: Commit and Push if updated
        run: |
          git config --local user.email "github-actions[bot]@github.com"
          git config --local user.name "github-actions[bot]"
          git add sent_articles.json
          git commit -m "chore: update sent articles cache" || echo "No changes to commit"
          git push
